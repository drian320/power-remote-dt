[workspace]
resolver = "2"
members = [
    "crates/protocol",
    "crates/transport",
    "crates/media-win",
    "crates/input-win",
    "crates/host",
    "crates/viewer",
    "crates/latency-bench",
    "crates/crypto",
    "crates/audio",
    "crates/filetransfer",
    "crates/signaling-proto",
    "crates/signaling-client",
    "crates/signaling-server",
]

[workspace.package]
edition = "2021"
rust-version = "1.78"
license = "Apache-2.0 OR MIT"

[workspace.dependencies]
# Async / IO
tokio = { version = "1.40", features = ["rt-multi-thread", "net", "macros", "sync", "time"] }

# Serialization
bincode = "1.3"
bytes = "1.7"
serde = { version = "1.0", features = ["derive"] }

# FEC
reed-solomon-erasure = "6.0"

# Error & logging
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# CLI
clap = { version = "4.5", features = ["derive"] }

# Testing
proptest = "1.5"

# Signaling
tokio-tungstenite = "0.24"
axum = { version = "0.7", features = ["ws"] }
serde_json = "1"
tokio-stream = "0.1"
uuid = { version = "1", features = ["v4"] }
dashmap = "6"
url = "2"
base64 = "0.22"

[profile.release]
lto = "thin"
codegen-units = 1
panic = "abort"
debug = "line-tables-only"
strip = "none"

[profile.dev]
opt-level = 1       # テストが 4K60 相当のバッファ処理で時間かかりすぎないように
# panic is left default (unwind) so proptest shrinking and #[should_panic] work
