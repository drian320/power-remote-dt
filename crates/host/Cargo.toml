[package]
name = "prdt-host"
version = "0.0.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[[bin]]
name = "prdt-host"
path = "src/main.rs"

[dependencies]
prdt-audio = { path = "../audio" }
prdt-crypto = { path = "../crypto" }
prdt-filetransfer = { path = "../filetransfer" }
prdt-protocol = { path = "../protocol" }
prdt-signaling-client = { path = "../signaling-client" }
prdt-signaling-proto = { path = "../signaling-proto" }
prdt-transport = { path = "../transport" }
tokio = { workspace = true, features = ["signal", "fs", "io-util"] }
url = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = "1"
rand_core = { version = "0.6", features = ["getrandom"] }

[target.'cfg(windows)'.dependencies]
prdt-media-win = { path = "../media-win" }
prdt-input-win = { path = "../input-win" }
