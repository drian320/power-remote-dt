[package]
name = "prdt-host"
version = "0.0.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

# PR5a: this crate is now lib-only. The legacy prdt-host.exe shim was
# removed; users invoke `prdt host [...]` via the prdt-client bin, which
# calls into prdt_host::run_with_args directly.

[dependencies]
prdt-audio = { path = "../audio" }
prdt-crypto = { path = "../crypto" }
prdt-filetransfer = { path = "../filetransfer" }
prdt-nat-traversal = { path = "../nat-traversal" }
prdt-protocol = { path = "../protocol" }
prdt-signaling-client = { path = "../signaling-client" }
prdt-signaling-proto = { path = "../signaling-proto" }
prdt-transport = { path = "../transport" }
tokio = { workspace = true, features = ["signal", "fs", "io-util", "time"] }
url = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = "1"
dirs = { workspace = true }
rand_core = { version = "0.6", features = ["getrandom"] }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }

[target.'cfg(windows)'.dependencies]
prdt-media-win = { path = "../media-win" }
prdt-media-sw = { path = "../media-sw" }
prdt-input-win = { path = "../input-win" }
tokio-util = { version = "0.7", features = ["rt"] }
prdt-gui-host = { path = "../gui-host" }
prdt-gui-common = { path = "../gui-common" }
async-trait = "0.1"
