[package]
name = "prdt-media-ffmpeg"
version = "0.0.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
prdt-media-core = { path = "../media-core" }
prdt-media-sw   = { path = "../media-sw" }
prdt-protocol   = { path = "../protocol" }
thiserror = { workspace = true }
tracing   = { workspace = true }
rusty_ffmpeg = { version = "=0.13.0", optional = true, features = ["ffmpeg5"] }

[features]
default = []
ffmpeg = ["dep:rusty_ffmpeg"]
ffmpeg-encode-hevc-vaapi = ["ffmpeg"]
