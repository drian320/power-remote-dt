[package]
name = "prdt-media-linux"
version = "0.0.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
prdt-media-core = { path = "../media-core" }
prdt-media-sw = { path = "../media-sw" }
prdt-media-policy = { path = "../media-policy" }
prdt-protocol = { path = "../protocol" }

[target.'cfg(target_os = "linux")'.dependencies]
x11rb = { workspace = true, features = ["shm"] }
thiserror = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true, features = ["time", "rt", "macros"] }
async-trait = "0.1"
anyhow = "1"
libc = "0.2"
serde = { workspace = true }
toml = { workspace = true }
zbus = { version = "4", default-features = false, features = ["tokio"] }
ashpd = { version = "0.12", default-features = false, features = ["tokio"] }
# pipewire runtime deferred: dev env (Ubuntu 22.04 pipewire 0.3.48) has libspa
# C ABI older than any current libspa Rust crate version expects (post-0.3.55
# struct shape — `spa_video_info_raw.flags`, `modifier: u64`). Foundation
# ships without pipewire; T5/T6 runtime impl lives on a successor branch on
# a host with pipewire >= 0.3.55 (Ubuntu 24.04+ / Fedora 39+).

[target.'cfg(target_os = "linux")'.dev-dependencies]
tokio = { workspace = true, features = ["test-util", "time", "rt", "macros"] }
