name: Release
on:
  push:
    tags:
      - 'phase-*'
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build (defaults to the workflow''s ref)'
        required: false
        default: ''

jobs:
  release-linux:
    name: Build Linux x86_64 release binary
    # Ubuntu 24.04 ships libpipewire-0.3 >= 1.0.5 (well above the 0.3.55
    # ABI floor that pipewire-rs 0.9 / libspa-sys-0.9.2 require). Ubuntu
    # 22.04 only has 0.3.48 and the build script panics with "Cannot find
    # libraries: libpipewire-0.3 >= 0.3" even when libpipewire-0.3-dev is
    # installed (the .pc file's Version field is checked at build time).
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libglib2.0-dev libdbus-1-dev \
            libxcb-shm0-dev libxcb-randr0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libssl-dev \
            libgtk-3-dev libpango1.0-dev libcairo2-dev \
            libgdk-pixbuf-2.0-dev libatk1.0-dev libayatana-appindicator3-dev \
            libasound2-dev \
            libpipewire-0.3-dev libspa-0.2-dev \
            libva-dev libva-drm2 libva-x11-2 \
            libxdo-dev

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Build prdt (unified host+viewer client, release profile)
        run: |
          cargo build \
            --release \
            -p prdt-client \
            --target x86_64-unknown-linux-gnu

      - name: Stage artifact
        run: |
          mkdir -p artifacts
          cp target/x86_64-unknown-linux-gnu/release/prdt artifacts/prdt-linux-x86_64
          chmod +x artifacts/prdt-linux-x86_64
          (cd artifacts && sha256sum prdt-linux-x86_64 > prdt-linux-x86_64.sha256)
          ls -la artifacts/
          file artifacts/prdt-linux-x86_64
          ldd  artifacts/prdt-linux-x86_64

      - name: Upload workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: prdt-linux-x86_64
          path: artifacts/
          retention-days: 30
          if-no-files-found: error

      - name: Create / update GitHub Release (tag push OR workflow_dispatch with tag ref)
        # Fires on:
        #   1. push event with refs/tags/* (normal tag-driven release)
        #   2. workflow_dispatch where the `ref` input names a tag (phase-* / v*)
        #      — used for backfilling releases after a CI hotfix without
        #      having to re-tag the historical commit
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'workflow_dispatch' && (
            startsWith(github.event.inputs.ref, 'phase-') ||
            startsWith(github.event.inputs.ref, 'v')
          ))
        uses: softprops/action-gh-release@v2
        with:
          # Override the default (= github.ref_name, which is "master" on
          # workflow_dispatch) so the Release attaches to the historical tag.
          tag_name: ${{ github.event.inputs.ref || github.ref_name }}
          files: |
            artifacts/prdt-linux-x86_64
            artifacts/prdt-linux-x86_64.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            `prdt` (the unified host+viewer client) for tag `${{ github.event.inputs.ref || github.ref_name }}`.

            **Install on a Linux box:**
            ```bash
            curl -L -o prdt https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/prdt-linux-x86_64
            chmod +x prdt
            ./prdt --help
            ```

            **Install on Linux via AppImage** (recommended — bundles FFmpeg 6 + VA-API + PipeWire codecs; needs `libfuse2` plus the standard desktop graphics stack (X11/Wayland + OpenGL), which every Linux desktop already has — minimal/headless environments may need `libgtk-3-0 libgl1 libegl1`):
            ```bash
            curl -fsSL -o prdt.AppImage https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/prdt-${{ github.ref_name }}-x86_64.AppImage
            chmod +x prdt.AppImage
            ./prdt.AppImage --help
            ```

            **AppImage vs bare ELF**: the AppImage has the **B-3 feature set** (VAAPI + NVENC + NVDEC + Main10 HEVC); the bare `prdt-linux-x86_64` has the **default feature set** (VAAPI H.264 only — you `apt install ffmpeg` separately for HEVC). Pick the AppImage unless you specifically need a smaller download or run on a glibc-incompatible distro (Alpine/musl, NixOS without `appimage-run`).

            **Install on a Windows box (PowerShell):**
            ```powershell
            curl.exe -L -o prdt.exe https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/prdt-windows-x86_64.exe
            .\prdt.exe --help
            ```

            **Windows FFmpeg build (`prdt-windows-x86_64-ffmpeg.zip`)**: mirrors the Linux AppImage. The bare `prdt-windows-x86_64.exe` uses Media Foundation only (`--encoder nvenc|mf`, `--decoder nvdec|mf`); the zip bundles the exe + pinned FFmpeg DLLs and additionally accepts `--encoder ffmpeg-nvenc-hevc[-main10]` and `--decoder ffmpeg-nvdec-hevc[-main10]`. MF stays the auto-default; keep the DLLs next to `prdt.exe` after extracting. Pick the zip only if you need the FFmpeg NVENC/NVDEC HEVC paths.

            **Run as host** (capture + serve):
            ```bash
            ./prdt host --bind 0.0.0.0:9000 --encoder openh264 --silent-allow
            ```

            **Run as viewer** (connect to a host):
            ```bash
            ./prdt connect --host <HOST_IP>:9000 \
                           --host-pubkey <PUBKEY_FROM_HOST_STDOUT> \
                           --decoder openh264 --codec h264
            ```

            Linux build: `ubuntu-24.04`. Runtime deps: `libasound2t64` (or `libasound2`), `libstdc++6`, `libwayland-client0`, `libpipewire-0.3-0` (any modern desktop Linux running PipeWire).
            Windows build: `windows-latest` (MSVC). Runtime deps: Windows 10 1809+ with Media Foundation H.264/H.265 codecs (default on most installs).

  release-linux-appimage:
    name: Build Linux x86_64 AppImage
    # No `needs: release-linux` — this job is INDEPENDENT (builds its own
    # ELF with the B-3 feature set). The bare ELF (default features) and
    # this AppImage's internal ELF (B-3 features) are different builds by
    # design; see plan §MAJOR-5 for rationale.
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install AppImage build host deps + Rust build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            patchelf desktop-file-utils file appstream \
            libfuse2 \
            libavcodec-dev libavutil-dev libavformat-dev libavfilter-dev libavdevice-dev \
            libswresample-dev libswscale-dev \
            libva-dev libva-drm2 libva-x11-2 \
            libpipewire-0.3-dev libopenh264-dev \
            libgtk-3-dev libayatana-appindicator3-dev \
            shellcheck \
            pkg-config \
            libglib2.0-dev libdbus-1-dev \
            libxcb-shm0-dev libxcb-randr0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libssl-dev \
            libpango1.0-dev libcairo2-dev \
            libgdk-pixbuf-2.0-dev libatk1.0-dev \
            libasound2-dev libspa-0.2-dev \
            libxdo-dev

      - name: Install nv-codec-headers (NVENC/NVDEC API headers, from upstream)
        # Ubuntu 24.04's `nv-codec-headers` package lives in `multiverse`
        # which the GitHub-hosted runner image no longer enables by default.
        # Cloning the upstream repo and running `make install` puts the headers
        # at /usr/local/include where rusty_ffmpeg's bindgen path picks them
        # up — exactly the same files the apt package shipped. Pin a release
        # tag so a future upstream API rename can't silently break the build.
        run: |
          git clone --depth=1 --branch n12.2.72.0 https://github.com/FFmpeg/nv-codec-headers.git /tmp/nv-codec-headers
          sudo make -C /tmp/nv-codec-headers PREFIX=/usr/local install

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Shellcheck AppRun + build script
        run: |
          shellcheck packaging/appimage/AppRun
          shellcheck scripts/build-appimage.sh

      - name: Validate desktop file
        run: desktop-file-validate packaging/appimage/net.example.PowerRemoteDt.desktop

      - name: Validate AppStream metadata (V7)
        run: appstreamcli validate --no-net packaging/appimage/net.example.PowerRemoteDt.appdata.xml || true

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ -n "${{ github.event.inputs.ref }}" ]]; then
            echo "VERSION=${{ github.event.inputs.ref }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          fi

      - name: Build prdt with AppImage B-3 feature set
        # Features must be a single comma-separated arg with no embedded whitespace —
        # YAML block scalar + bash `\<newline>` line continuation injects the indent
        # whitespace into the joined line and cargo then parses each feature as a
        # separate argv slot ("unexpected argument 'vaapi-h264,' found").
        #
        # rusty_ffmpeg's build.rs dispatches on FFMPEG_DLL_PATH at line 591 of its
        # build.rs: when set, it takes the `dynamic_linking()` path (just links
        # -lavcodec from the given .so's parent dir). Without it, it falls through
        # to `linking()` which panics unless FFMPEG_PKG_CONFIG_PATH /
        # FFMPEG_LIBS_DIR / the link_system_ffmpeg feature is set. The dev
        # container sets these env vars via docker run -e (see
        # scripts/dev-container.sh); CI's bare-host AppImage build needs them
        # exported explicitly. Paths match Ubuntu 24.04 multiarch (provided by
        # the libavcodec-dev / libavutil-dev installed above).
        env:
          FFMPEG_DLL_PATH: /usr/lib/x86_64-linux-gnu/libavcodec.so
          FFMPEG_INCLUDE_DIR: /usr/include/x86_64-linux-gnu
        run: |
          cargo build --release -p prdt-client \
            --target x86_64-unknown-linux-gnu \
            --features vaapi-h264,ffmpeg-encode-hevc-vaapi-ffmpeg6,ffmpeg-decode-hevc-vaapi-ffmpeg6,ffmpeg-decode-hevc-sw-ffmpeg6,ffmpeg-encode-hevc-nvenc-ffmpeg6,ffmpeg-decode-hevc-nvdec-ffmpeg6,ffmpeg-encode-hevc-vaapi-main10-ffmpeg6,ffmpeg-encode-hevc-nvenc-main10-ffmpeg6,ffmpeg-decode-hevc-vaapi-main10-ffmpeg6,ffmpeg-decode-hevc-nvdec-main10-ffmpeg6

      - name: Build AppImage
        run: |
          PRDT_BIN=target/x86_64-unknown-linux-gnu/release/prdt \
          VERSION=${{ steps.ver.outputs.VERSION }} \
          ARCH=x86_64 \
            ./scripts/build-appimage.sh

      - name: Container smoke test on Ubuntu 24.04 (A2)
        # Was 22.04 originally. AppImage build moved to ubuntu-24.04 runner
        # (libpipewire ABI floor), so bundled .so's reference glibc 2.36-2.38
        # and the V5 floor is now 2.39 (see scripts/build-appimage.sh:326).
        # ubuntu:22.04 ships glibc 2.35 and can no longer run this AppImage.
        #
        # This is the FUSE-mounted path (M-1 below covers the FUSE-less
        # extract-and-run path). A FUSE AppImage self-mounts via libfuse, so
        # the container needs the /dev/fuse device node + CAP_SYS_ADMIN +
        # an unconfined apparmor profile; without them mount() fails with
        # "fuse: device not found" and the AppImage runtime aborts (exit 127).
        #
        # Runtime deps installed below: the AppImage bundles its app-specific
        # libs (FFmpeg, libva client, pipewire client, openh264, appindicator,
        # libasound, libdrm), but the X11/Wayland/OpenGL desktop graphics
        # stack is deliberately NOT bundled — libGL/libEGL are GPU-driver-
        # coupled and bundling them breaks rendering on the host. winit links
        # libX11 / libxcb / libxkbcommon / libGL as hard DT_NEEDED deps, so a
        # bare ubuntu:24.04 container can't even load prdt for `--help`.
        # libgtk-3-0 transitively pulls the whole X11 + cairo + pango + gdk
        # stack; add the GL/EGL/xkb/wayland-egl pieces winit needs on top.
        # Any real Linux desktop already has all of these.
        run: |
          docker run --rm \
            --device /dev/fuse \
            --cap-add SYS_ADMIN \
            --security-opt apparmor:unconfined \
            -v $PWD/dist:/dist ubuntu:24.04 bash -c "
            apt-get update -qq &&
            apt-get install -y -qq --no-install-recommends \
              libfuse2 ca-certificates \
              libgtk-3-0 libgl1 libegl1 libxkbcommon0 libxkbcommon-x11-0 \
              libwayland-client0 libwayland-cursor0 libwayland-egl1 \
              libxi6 libxrandr2 libxcursor1 libxfixes3 &&
            timeout 5 /dist/prdt-${{ steps.ver.outputs.VERSION }}-x86_64.AppImage --help
          "

      - name: Container smoke test — FUSE-less (--appimage-extract-and-run, M-1, Ubuntu 24.04)
        run: |
          docker run --rm -v $PWD/dist:/dist ubuntu:24.04 bash -c "
            apt-get update -qq &&
            apt-get install -y -qq --no-install-recommends \
              ca-certificates \
              libgtk-3-0 libgl1 libegl1 libxkbcommon0 libxkbcommon-x11-0 \
              libwayland-client0 libwayland-cursor0 libwayland-egl1 \
              libxi6 libxrandr2 libxcursor1 libxfixes3 &&
            timeout 10 /dist/prdt-${{ steps.ver.outputs.VERSION }}-x86_64.AppImage --appimage-extract-and-run --help
          "

      - name: Upload AppImage as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: prdt-linux-x86_64-appimage
          path: dist/
          retention-days: 30
          if-no-files-found: error

      - name: Attach AppImage to GitHub Release
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'workflow_dispatch' && (
            startsWith(github.event.inputs.ref, 'phase-') ||
            startsWith(github.event.inputs.ref, 'v')
          ))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.ref || github.ref_name }}
          files: |
            dist/prdt-${{ steps.ver.outputs.VERSION }}-x86_64.AppImage
            dist/prdt-${{ steps.ver.outputs.VERSION }}-x86_64.AppImage.sha256
          fail_on_unmatched_files: true

  release-windows:
    name: Build Windows x86_64 release binary
    # windows-latest = windows-2022 at time of writing. Mirrors the
    # CI workflow (.github/workflows/ci.yml) which uses the same
    # runner for cargo build --workspace, so we know the toolchain
    # + system libs (MSVC, Win SDK, Media Foundation headers) are
    # present.
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Build prdt (unified host+viewer client, release profile)
        run: |
          cargo build --release -p prdt-client --target x86_64-pc-windows-msvc

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/x86_64-pc-windows-msvc/release/prdt.exe artifacts/prdt-windows-x86_64.exe
          (cd artifacts && sha256sum prdt-windows-x86_64.exe > prdt-windows-x86_64.exe.sha256)
          ls -la artifacts/

      # ── FFmpeg-enabled Windows build (separate opt-in artifact) ───────────────
      # Mirrors the Linux "bare ELF + feature-rich AppImage" split: the bare
      # prdt-windows-x86_64.exe above stays FFmpeg-free, and this produces an
      # additional prdt-windows-x86_64-ffmpeg.zip bundling the exe + the pinned
      # BtbN FFmpeg DLLs. Runtime selection: --encoder ffmpeg-nvenc-hevc[-main10]
      # / --decoder ffmpeg-nvdec-hevc[-main10] (MF stays the auto-default).
      - name: FFmpeg — cache Windows DLLs
        uses: actions/cache@v4
        with:
          path: target/windows-ffmpeg
          key: ffmpeg-windows-${{ hashFiles('packaging/windows/ffmpeg-manifest.json') }}

      - name: FFmpeg — fetch Windows DLLs
        shell: pwsh
        run: .\scripts\fetch-ffmpeg-windows.ps1

      - name: FFmpeg — export build env vars
        shell: pwsh
        run: |
          . target\windows-ffmpeg\env.ps1
          echo "FFMPEG_DLL_PATH=$env:FFMPEG_DLL_PATH"       >> $env:GITHUB_ENV
          echo "FFMPEG_INCLUDE_DIR=$env:FFMPEG_INCLUDE_DIR" >> $env:GITHUB_ENV
          echo "FFMPEG_LIB_DIR=$env:FFMPEG_LIB_DIR"         >> $env:GITHUB_ENV

      - name: Build prdt with FFmpeg HEVC NVENC/NVDEC (8-bit + Main10)
        # Rebuilds prdt.exe with the media-win-ffmpeg features. The bare exe was
        # already copied to artifacts/ above, so this overwrite only affects the
        # FFmpeg zip staged below.
        run: |
          cargo build --release -p prdt-client --target x86_64-pc-windows-msvc --features media-win-ffmpeg-nvenc,media-win-ffmpeg-nvenc-main10,media-win-ffmpeg-nvdec,media-win-ffmpeg-nvdec-main10

      - name: Stage FFmpeg zip artifact
        shell: pwsh
        run: |
          $stage = 'artifacts/prdt-windows-x86_64-ffmpeg'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/prdt.exe "$stage/prdt.exe"
          Copy-Item "$env:FFMPEG_DLL_PATH/*.dll" $stage
          Compress-Archive -Path "$stage/*" -DestinationPath artifacts/prdt-windows-x86_64-ffmpeg.zip -Force
          $hash = (Get-FileHash -Algorithm SHA256 artifacts/prdt-windows-x86_64-ffmpeg.zip).Hash.ToLower()
          "$hash  prdt-windows-x86_64-ffmpeg.zip" | Set-Content -Encoding ASCII artifacts/prdt-windows-x86_64-ffmpeg.zip.sha256
          Remove-Item -Recurse -Force $stage
          Get-ChildItem artifacts

      - name: Upload workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: prdt-windows-x86_64
          path: artifacts/
          retention-days: 30
          if-no-files-found: error

      - name: Attach Windows binary to GitHub Release
        # Same gate as the Linux job. The action handles concurrent
        # uploads to the same release by merging files — the Linux
        # job's body wins because softprops/action-gh-release@v2
        # preserves existing body on subsequent calls when no `body`
        # is set here.
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'workflow_dispatch' && (
            startsWith(github.event.inputs.ref, 'phase-') ||
            startsWith(github.event.inputs.ref, 'v')
          ))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.ref || github.ref_name }}
          files: |
            artifacts/prdt-windows-x86_64.exe
            artifacts/prdt-windows-x86_64.exe.sha256
            artifacts/prdt-windows-x86_64-ffmpeg.zip
            artifacts/prdt-windows-x86_64-ffmpeg.zip.sha256
          fail_on_unmatched_files: true
