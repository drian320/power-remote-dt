name: Smoke build — FFmpeg HEVC (VAAPI + NVENC)

# Builds the unified `prdt` binary for Linux x86_64 WITH FFmpeg HEVC features
# enabled, for manual smoke testing on real hardware:
#   - `ffmpeg-encode-hevc-vaapi`: iGPU host smoke (Intel/AMD VAAPI)
#   - `ffmpeg-encode-hevc-nvenc`: NVIDIA GPU host smoke (NVENC via CUDA)
# See `docs/superpowers/plan-ffmpeg-hevc-vaapi-smoke.md` for the full procedure.
#
# This workflow is intentionally separate from `release.yml` because:
#   1. The FFmpeg feature pulls a new runtime dep (system libavcodec.so etc.)
#      that's heavier than the default `prdt` distribution targets.
#   2. P1/P1.5 are in flight; we don't want every release tag to start shipping
#      the feature until the ADR is `Accepted` and hardware smoke is logged.
#
# Triggered manually from the Actions UI (`workflow_dispatch`). Built binaries
# are uploaded as workflow artifacts (no GitHub Release attached), downloadable
# from the run page for 30 days.

on:
  # workflow_dispatch requires the workflow file to live on the default branch
  # (a documented GitHub limitation). Add `pull_request` so the workflow can
  # produce a downloadable artifact while still on the feature branch — useful
  # for the iGPU smoke before P1 merges. Once P1 is on master, the dispatch
  # trigger is the primary path and pull_request can be removed in a
  # follow-up if it's noisy.
  pull_request:
    paths:
      - "crates/media-ffmpeg/**"
      - "crates/host/**"
      - "crates/client/**"
      - "crates/viewer/**"
      - "crates/media-win/**"
      - "scripts/Dockerfile.dev"
      - ".github/workflows/smoke-build-ffmpeg-hevc.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build (defaults to the workflow's ref)"
        required: false
        default: ""

jobs:
  build-linux:
    name: Build Linux x86_64 prdt with FFmpeg HEVC VAAPI
    # Ubuntu 24.04 has libpipewire-0.3 >= 1.0.5 (matches release.yml) and a
    # recent enough libavcodec-dev (FFmpeg 6.x; rusty_ffmpeg 0.13.0 with
    # features=["ffmpeg5"] generates bindings from system headers so the
    # 5.x vs 6.x minor delta is absorbed by bindgen).
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install Linux build deps (release.yml + FFmpeg dev libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libglib2.0-dev libdbus-1-dev \
            libxcb-shm0-dev libxcb-randr0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libssl-dev \
            libgtk-3-dev libpango1.0-dev libcairo2-dev \
            libgdk-pixbuf-2.0-dev libatk1.0-dev libayatana-appindicator3-dev \
            libasound2-dev \
            libpipewire-0.3-dev libspa-0.2-dev \
            libva-dev libva-drm2 libva-x11-2 \
            libxdo-dev \
            libavcodec-dev libavutil-dev libavfilter-dev libavformat-dev \
            libavdevice-dev libswresample-dev libswscale-dev \
            clang libclang-dev

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Build prdt with ffmpeg-encode-hevc-vaapi feature
        env:
          # rusty_ffmpeg 0.13.0's build script reads these to invoke bindgen
          # against the apt-installed FFmpeg headers and to set rustc-link
          # search paths against libavcodec.so. Without them the build either
          # fails at bindgen or silently links the wrong copy.
          FFMPEG_INCLUDE_DIR: /usr/include/x86_64-linux-gnu
          FFMPEG_DLL_PATH: /usr/lib/x86_64-linux-gnu/libavcodec.so
        run: |
          cargo build \
            --release \
            -p prdt-client \
            --features ffmpeg-encode-hevc-vaapi \
            --target x86_64-unknown-linux-gnu

      - name: Stage artifact
        run: |
          mkdir -p artifacts
          cp target/x86_64-unknown-linux-gnu/release/prdt artifacts/prdt-linux-x86_64-ffmpeg-hevc
          chmod +x artifacts/prdt-linux-x86_64-ffmpeg-hevc
          (cd artifacts && sha256sum prdt-linux-x86_64-ffmpeg-hevc > prdt-linux-x86_64-ffmpeg-hevc.sha256)
          ls -la artifacts/
          file artifacts/prdt-linux-x86_64-ffmpeg-hevc
          # ldd shows the libavcodec runtime dep — verifies dynamic link landed.
          ldd  artifacts/prdt-linux-x86_64-ffmpeg-hevc | grep -E 'libav|libva' || true

      - name: Upload VAAPI workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: prdt-linux-x86_64-ffmpeg-hevc
          path: artifacts/prdt-linux-x86_64-ffmpeg-hevc*
          retention-days: 30
          if-no-files-found: error

      - name: Build prdt with ffmpeg-encode-hevc-nvenc feature (P1.5)
        env:
          FFMPEG_INCLUDE_DIR: /usr/include/x86_64-linux-gnu
          FFMPEG_DLL_PATH: /usr/lib/x86_64-linux-gnu/libavcodec.so
        run: |
          cargo build \
            --release \
            -p prdt-client \
            --features ffmpeg-encode-hevc-nvenc \
            --target x86_64-unknown-linux-gnu

      - name: Stage NVENC artifact
        run: |
          cp target/x86_64-unknown-linux-gnu/release/prdt artifacts/prdt-linux-x86_64-ffmpeg-nvenc-hevc
          chmod +x artifacts/prdt-linux-x86_64-ffmpeg-nvenc-hevc
          (cd artifacts && sha256sum prdt-linux-x86_64-ffmpeg-nvenc-hevc > prdt-linux-x86_64-ffmpeg-nvenc-hevc.sha256)
          ls -la artifacts/prdt-linux-x86_64-ffmpeg-nvenc-hevc*
          file artifacts/prdt-linux-x86_64-ffmpeg-nvenc-hevc
          # Show dynamic deps; assert libnvidia-encode.so.1 is NOT linked at
          # build time (it is lazy-loaded at runtime by ffmpeg, not link-time).
          ldd artifacts/prdt-linux-x86_64-ffmpeg-nvenc-hevc | grep -E 'libav|libcuda|libnvidia' || true
          if ldd artifacts/prdt-linux-x86_64-ffmpeg-nvenc-hevc | grep -q 'libnvidia-encode'; then
            echo "::error::libnvidia-encode.so.1 appears in ldd output — binary was accidentally linked at build time"
            exit 1
          fi

      - name: Upload NVENC workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: prdt-linux-x86_64-ffmpeg-nvenc-hevc
          path: artifacts/prdt-linux-x86_64-ffmpeg-nvenc-hevc*
          retention-days: 30
          if-no-files-found: error

      - name: Build prdt with all three HEVC decoders (P2 — Linux↔Linux viewer)
        env:
          FFMPEG_INCLUDE_DIR: /usr/include/x86_64-linux-gnu
          FFMPEG_DLL_PATH: /usr/lib/x86_64-linux-gnu/libavcodec.so
        run: |
          cargo build \
            --release \
            -p prdt-client \
            --features ffmpeg-decode-hevc-sw,ffmpeg-decode-hevc-vaapi,ffmpeg-decode-hevc-nvdec \
            --target x86_64-unknown-linux-gnu

      - name: Stage HEVC-decode artifact
        run: |
          cp target/x86_64-unknown-linux-gnu/release/prdt artifacts/prdt-linux-x86_64-ffmpeg-hevc-decode
          chmod +x artifacts/prdt-linux-x86_64-ffmpeg-hevc-decode
          (cd artifacts && sha256sum prdt-linux-x86_64-ffmpeg-hevc-decode > prdt-linux-x86_64-ffmpeg-hevc-decode.sha256)
          ls -la artifacts/prdt-linux-x86_64-ffmpeg-hevc-decode*
          file artifacts/prdt-linux-x86_64-ffmpeg-hevc-decode
          # Show dynamic deps; assert libnvcuvid.so.1 and libnvidia-encode.so.1
          # are NOT linked at build time (NVDEC + NVENC libs are lazy-loaded by
          # ffmpeg at runtime so the artifact stays portable to non-NVIDIA hosts).
          ldd artifacts/prdt-linux-x86_64-ffmpeg-hevc-decode | grep -E 'libav|libva|libcuda|libnvidia|libnvcuvid' || true
          if ldd artifacts/prdt-linux-x86_64-ffmpeg-hevc-decode | grep -qE 'libnvcuvid|libnvidia-encode'; then
            echo "::error::libnvcuvid.so.1 / libnvidia-encode.so.1 appears in ldd output — binary was accidentally linked at build time"
            exit 1
          fi

      - name: Upload HEVC-decode workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: prdt-linux-x86_64-ffmpeg-hevc-decode
          path: artifacts/prdt-linux-x86_64-ffmpeg-hevc-decode*
          retention-days: 30
          if-no-files-found: error

      - name: Install CUDA toolkit (P2.5 — cudart + NPP link-time deps)
        # The NPP encode path links against -lcudart + -lnppicc at build time
        # (the symbols are hand-declared in `crates/media-ffmpeg/src/cuda_npp.rs`).
        # The Dockerfile.dev pulls these from NVIDIA's apt repo for the dev
        # container; here we install them onto the bare ubuntu-24.04 runner.
        # The .so.1 SONAMEs are still lazy-loaded at runtime (the ldd guard
        # below only requires their presence at link time, not runtime — runtime
        # NVIDIA driver libs stay absent from the artifact).
        # Pinned to 12-6 (closest patch version to Dockerfile.dev's 12-4 that
        # NVIDIA's ubuntu2404 repo actually carries — 12-4 is debian12-only).
        # Driver 535+ supports CUDA 12.6 via forward compat (same constraint
        # as 12-4 per P1.5 A8). The .so SONAMEs we link (libcudart.so,
        # libnppicc.so) are ABI-stable across 12.x patches.
        run: |
          curl -fsSL https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb \
            -o /tmp/cuda-keyring.deb
          sudo dpkg -i /tmp/cuda-keyring.deb
          rm /tmp/cuda-keyring.deb
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cuda-cudart-dev-12-6 \
            libnpp-dev-12-6
          # Surface the install location for the rustc linker via LIBRARY_PATH
          # in the build step (NVIDIA installs to /usr/local/cuda-12.6/lib64
          # which is not in the default linker search path).
          ls -la /usr/local/cuda-12.6/lib64/libcudart.so* /usr/local/cuda-12.6/lib64/libnppicc.so* || true

      - name: Build prdt with NVENC + NPP encode path (P2.5 — NVIDIA GPU host smoke)
        env:
          FFMPEG_INCLUDE_DIR: /usr/include/x86_64-linux-gnu
          FFMPEG_DLL_PATH: /usr/lib/x86_64-linux-gnu/libavcodec.so
          # rustc-link search path for NVIDIA's CUDA toolkit (apt installs into
          # /usr/local/cuda-12.6/lib64, which isn't on the default ld path).
          LIBRARY_PATH: /usr/local/cuda-12.6/lib64
        run: |
          # ffmpeg-encode-hevc-nvenc-npp transitively enables ffmpeg-encode-hevc-nvenc
          # (per R4 Cargo dep chain). All three decode backends included so the
          # artifact can serve as both host and viewer on a NVIDIA Linux box.
          cargo build \
            --release \
            -p prdt-client \
            --features ffmpeg-encode-hevc-vaapi,ffmpeg-encode-hevc-nvenc-npp,ffmpeg-decode-hevc-sw,ffmpeg-decode-hevc-vaapi,ffmpeg-decode-hevc-nvdec \
            --target x86_64-unknown-linux-gnu

      - name: Stage HEVC-encode-NPP artifact
        run: |
          cp target/x86_64-unknown-linux-gnu/release/prdt artifacts/prdt-linux-x86_64-ffmpeg-hevc-encode-npp
          chmod +x artifacts/prdt-linux-x86_64-ffmpeg-hevc-encode-npp
          (cd artifacts && sha256sum prdt-linux-x86_64-ffmpeg-hevc-encode-npp > prdt-linux-x86_64-ffmpeg-hevc-encode-npp.sha256)
          ls -la artifacts/prdt-linux-x86_64-ffmpeg-hevc-encode-npp*
          file artifacts/prdt-linux-x86_64-ffmpeg-hevc-encode-npp
          # ldd portability guard: libcudart.so.12 + libnppicc.so.12 are runtime
          # deps for the NPP path; libnvidia-encode.so.1 must NOT appear at
          # link time (lazy-loaded by FFmpeg at runtime, same as plain NVENC).
          ldd artifacts/prdt-linux-x86_64-ffmpeg-hevc-encode-npp \
            | grep -E 'libav|libcuda|libnpp|libnvidia' || true
          if ldd artifacts/prdt-linux-x86_64-ffmpeg-hevc-encode-npp \
               | grep -q 'libnvidia-encode'; then
            echo "::error::libnvidia-encode.so.1 in ldd output — linked at build time (must be lazy-loaded)"
            exit 1
          fi

      - name: Upload HEVC-encode-NPP workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: prdt-linux-x86_64-ffmpeg-hevc-encode-npp
          path: artifacts/prdt-linux-x86_64-ffmpeg-hevc-encode-npp*
          retention-days: 30
          if-no-files-found: error

      - name: Build prdt with VAAPI + NVENC Main10 encode paths (P3 — HDR10 smoke)
        # No CUDA toolkit needed for Main10: vaapi-main10 and nvenc-main10 use
        # standard FFmpeg API calls (no NPP hand-declarations). CUDA toolkit is
        # already installed above (for the NPP step) so linker search paths are
        # still valid if the nvenc-main10 path indirectly needs them.
        env:
          FFMPEG_INCLUDE_DIR: /usr/include/x86_64-linux-gnu
          FFMPEG_DLL_PATH: /usr/lib/x86_64-linux-gnu/libavcodec.so
          LIBRARY_PATH: /usr/local/cuda-12.6/lib64
        run: |
          cargo build \
            --release \
            -p prdt-client \
            --features ffmpeg-encode-hevc-vaapi-main10,ffmpeg-encode-hevc-nvenc-main10 \
            --target x86_64-unknown-linux-gnu

      - name: Stage HEVC-encode-Main10 artifact
        run: |
          cp target/x86_64-unknown-linux-gnu/release/prdt artifacts/prdt-linux-x86_64-ffmpeg-hevc-encode-main10
          chmod +x artifacts/prdt-linux-x86_64-ffmpeg-hevc-encode-main10
          (cd artifacts && sha256sum prdt-linux-x86_64-ffmpeg-hevc-encode-main10 > prdt-linux-x86_64-ffmpeg-hevc-encode-main10.sha256)
          ls -la artifacts/prdt-linux-x86_64-ffmpeg-hevc-encode-main10*
          file artifacts/prdt-linux-x86_64-ffmpeg-hevc-encode-main10
          ldd artifacts/prdt-linux-x86_64-ffmpeg-hevc-encode-main10 | grep -E 'libav|libva|libcuda|libnvidia' || true

      - name: Upload HEVC-encode-Main10 workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: prdt-linux-x86_64-ffmpeg-hevc-encode-main10
          path: artifacts/prdt-linux-x86_64-ffmpeg-hevc-encode-main10*
          retention-days: 30
          if-no-files-found: error

      - name: Build prdt with all three HEVC Main10 decoders (P3 — Linux↔Linux Main10 viewer)
        # No CUDA toolkit needed: nvdec-main10 uses FFmpeg native API with
        # libnvcuvid lazy-loaded at runtime. LIBRARY_PATH is already set from
        # the NPP step above but is harmless for the decode-main10 path.
        env:
          FFMPEG_INCLUDE_DIR: /usr/include/x86_64-linux-gnu
          FFMPEG_DLL_PATH: /usr/lib/x86_64-linux-gnu/libavcodec.so
          LIBRARY_PATH: /usr/local/cuda-12.6/lib64
        run: |
          cargo build \
            --release \
            -p prdt-client \
            --features ffmpeg-decode-hevc-sw-main10,ffmpeg-decode-hevc-vaapi-main10,ffmpeg-decode-hevc-nvdec-main10 \
            --target x86_64-unknown-linux-gnu

      - name: Stage HEVC-decode-Main10 artifact
        run: |
          cp target/x86_64-unknown-linux-gnu/release/prdt artifacts/prdt-linux-x86_64-ffmpeg-hevc-decode-main10
          chmod +x artifacts/prdt-linux-x86_64-ffmpeg-hevc-decode-main10
          (cd artifacts && sha256sum prdt-linux-x86_64-ffmpeg-hevc-decode-main10 > prdt-linux-x86_64-ffmpeg-hevc-decode-main10.sha256)
          ls -la artifacts/prdt-linux-x86_64-ffmpeg-hevc-decode-main10*
          file artifacts/prdt-linux-x86_64-ffmpeg-hevc-decode-main10
          # Assert libnvcuvid and libnvidia-encode are NOT linked at build time
          # (both are lazy-loaded by FFmpeg at runtime).
          ldd artifacts/prdt-linux-x86_64-ffmpeg-hevc-decode-main10 | grep -E 'libav|libva|libcuda|libnvidia|libnvcuvid' || true
          if ldd artifacts/prdt-linux-x86_64-ffmpeg-hevc-decode-main10 | grep -qE 'libnvcuvid|libnvidia-encode'; then
            echo "::error::libnvcuvid.so.1 / libnvidia-encode.so.1 appears in ldd output — binary was accidentally linked at build time"
            exit 1
          fi

      - name: Upload HEVC-decode-Main10 workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: prdt-linux-x86_64-ffmpeg-hevc-decode-main10
          path: artifacts/prdt-linux-x86_64-ffmpeg-hevc-decode-main10*
          retention-days: 30
          if-no-files-found: error

  build-windows:
    name: Build Windows x86_64 prdt (viewer-side, no FFmpeg feature)
    # Windows side decodes HEVC via Media Foundation / NVDEC — it does NOT need
    # the ffmpeg-encode-hevc-vaapi feature. We just want a downloadable prdt.exe
    # that pairs with the Linux-side ffmpeg-hevc artifact so the iGPU smoke can
    # be run end-to-end (Arch host → Windows viewer) without forcing the user
    # to install Rust on Windows.
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Build prdt (release, no FFmpeg feature)
        run: |
          cargo build --release -p prdt-client --target x86_64-pc-windows-msvc

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/x86_64-pc-windows-msvc/release/prdt.exe artifacts/prdt-windows-x86_64.exe
          (cd artifacts && sha256sum prdt-windows-x86_64.exe > prdt-windows-x86_64.exe.sha256)
          ls -la artifacts/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: prdt-windows-x86_64
          path: artifacts/
          retention-days: 30
          if-no-files-found: error

      - name: Build prdt with media-win-hdr10,media-win-hevc-main10 features (F8 — Windows HDR10 + Main10 smoke)
        # Produces a separate artifact for manual HDR10 + HEVC Main10 smoke
        # testing on an HDR10-capable Windows display. Rebuilds the PR3
        # prdt-windows-x86_64-hdr10.exe artifact with the F8 Main10 decoder
        # included. Pre-F8 users who specifically wanted HDR10-without-decode
        # can revert via `--features media-win-hdr10` in local builds.
        # Requires Windows 11 22H2+ with the HDR toggle ON and the "HEVC Video
        # Extensions" UWP package (ProductId 9NMZLZ57R3T7) installed.
        run: |
          cargo build --release -p prdt-client --features media-win-hdr10,media-win-hevc-main10 --target x86_64-pc-windows-msvc

      - name: Stage HDR10 artifact
        shell: bash
        run: |
          cp target/x86_64-pc-windows-msvc/release/prdt.exe artifacts/prdt-windows-x86_64-hdr10.exe
          (cd artifacts && sha256sum prdt-windows-x86_64-hdr10.exe > prdt-windows-x86_64-hdr10.exe.sha256)
          ls -la artifacts/prdt-windows-x86_64-hdr10*

      - name: Upload HDR10 workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: prdt-windows-x86_64-hdr10
          path: artifacts/prdt-windows-x86_64-hdr10*
          retention-days: 30
          if-no-files-found: error
